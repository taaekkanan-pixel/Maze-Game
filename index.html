<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maze Game</title>
<style>
  body { margin:0; font-family:Arial; background:#111; color:#fff; text-align:center; }
  canvas { background:#000; display:block; margin:20px auto; touch-action:none; }
  h1 { margin-top:20px; }
  button { padding:10px 15px; margin:5px; font-size:16px; }
</style>
</head>
<body>
<h1>Maze Escape Game</h1>
<p>Move: Swipe or Arrow Keys</p>
<button onclick="resetGame()">Reset</button>
<canvas id="mazeCanvas"></canvas>

<script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');

const rows = 31;
const cols = 31;
const cellSize = 20;
canvas.width = cols * cellSize;
canvas.height = rows * cellSize;

let maze = [];
let player = { x: 1, y: 1 };
let goal = { x: cols - 2, y: rows - 2 };

function generateMaze() {
  maze = Array.from({ length: rows }, () => Array(cols).fill(1));

  function carve(x, y) {
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);

    for (let [dx, dy] of dirs) {
      let nx = x + dx;
      let ny = y + dy;

      if (nx > 0 && ny > 0 && nx < cols-1 && ny < rows-1 && maze[ny][nx] === 1) {
        maze[ny][nx] = 0;
        maze[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }

  maze[1][1] = 0;
  carve(1,1);

  for (let i = 0; i < 80; i++) {
    let x = Math.floor(Math.random() * (cols-2)) + 1;
    let y = Math.floor(Math.random() * (rows-2)) + 1;
    maze[y][x] = 0;
  }

  let visited = Array.from({ length: rows }, () => Array(cols).fill(false));
  let queue = [{x:1,y:1,d:0}];
  visited[1][1] = true;
  let farthest = {x:1,y:1,d:0};

  while(queue.length) {
    let {x,y,d} = queue.shift();
    if (d > farthest.d) farthest = {x,y,d};

    for (let [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      let nx = x+dx, ny = y+dy;
      if (maze[ny] && maze[ny][nx] === 0 && !visited[ny][nx]) {
        visited[ny][nx] = true;
        queue.push({x:nx,y:ny,d:d+1});
      }
    }
  }

  goal = { x: farthest.x, y: farthest.y };
}

function drawMaze() {
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      ctx.fillStyle = maze[y][x] === 1 ? '#444' : '#000';
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }
  }

  ctx.fillStyle = 'green';
  ctx.fillRect(goal.x * cellSize, goal.y * cellSize, cellSize, cellSize);

  ctx.fillStyle = 'red';
  ctx.fillRect(player.x * cellSize, player.y * cellSize, cellSize, cellSize);
}

function movePlayer(dx, dy) {
  const nx = player.x + dx;
  const ny = player.y + dy;

  if (maze[ny] && maze[ny][nx] === 0) {
    player.x = nx;
    player.y = ny;
  }

  if (player.x === goal.x && player.y === goal.y) {
    setTimeout(() => {
      alert('You escaped!');
      resetGame();
    }, 100);
  }

  drawMaze();
}

// keyboard

document.addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }

  switch (e.key) {
    case 'ArrowUp': movePlayer(0, -1); break;
    case 'ArrowDown': movePlayer(0, 1); break;
    case 'ArrowLeft': movePlayer(-1, 0); break;
    case 'ArrowRight': movePlayer(1, 0); break;
  }
});

// touch swipe (for iPad / mobile)
let startX = 0;
let startY = 0;

canvas.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  startX = touch.clientX;
  startY = touch.clientY;
});

canvas.addEventListener('touchend', (e) => {
  const touch = e.changedTouches[0];
  let dx = touch.clientX - startX;
  let dy = touch.clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20) movePlayer(1, 0);
    else if (dx < -20) movePlayer(-1, 0);
  } else {
    if (dy > 20) movePlayer(0, 1);
    else if (dy < -20) movePlayer(0, -1);
  }
});

function resetGame() {
  generateMaze();
  player = { x: 1, y: 1 };
  drawMaze();
}

resetGame();
</script>
</body>
</html>
